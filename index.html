<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CyberPath - Ruta de Aprendizaje</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    :root {
      --bg: #050510;
      --card: rgba(15, 15, 30, 0.9);
      --text: #e0e0e8;
      --text-dim: #808090;
      --green: #00ff88;
      --green-dim: #00cc6a;
      --border: rgba(0, 255, 136, 0.2);
      --orange: #ff9500;
      --blue: #5e9eff;
      --red: #ff5555;
      --header-height: 60px;
    }

    body {
      font-family: 'JetBrains Mono', monospace;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.5;
      padding-top: var(--header-height);
    }

    /* Canvas fondo */
    #stars {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      transition: opacity 0.3s ease;
    }

    .nebula {
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse at 30% 20%, rgba(50, 20, 80, 0.4) 0%, transparent 50%),
                  radial-gradient(ellipse at 70% 80%, rgba(20, 50, 80, 0.3) 0%, transparent 50%);
      z-index: 1;
      pointer-events: none;
      transition: opacity 0.3s ease;
    }

    /* STICKY HEADER */
    .sticky-header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 100;
      background: rgba(5, 5, 16, 0.85);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(0, 255, 136, 0.1);
      transition: all 0.3s ease;
    }

    .sticky-header.scrolled {
      background: rgba(5, 5, 16, 0.95);
      border-bottom-color: rgba(0, 255, 136, 0.25);
    }

    .header-inner {
      max-width: 1200px;
      margin: 0 auto;
      padding: 12px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    .logo-section {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }

    .logo {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 1.4rem;
      font-weight: 700;
      white-space: nowrap;
    }

    .logo span { color: var(--green); }

    .header-progress {
      display: flex;
      align-items: center;
      gap: 12px;
      flex: 1;
      max-width: 300px;
    }

    .mini-progress {
      flex: 1;
      height: 6px;
      background: rgba(0, 255, 136, 0.1);
      border-radius: 3px;
      overflow: hidden;
    }

    .mini-progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--green-dim), var(--green));
      border-radius: 3px;
      transition: width 0.3s ease;
    }

    .mini-percent {
      font-size: 0.85rem;
      font-weight: 700;
      color: var(--green);
      min-width: 40px;
      text-align: right;
    }

    /* Mobile menu button */
    .menu-btn {
      display: none;
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text);
      padding: 8px;
      border-radius: 6px;
      cursor: pointer;
    }

    .menu-btn:hover {
      border-color: var(--green);
    }

    /* Tabs in header */
    .header-tabs {
      display: flex;
      gap: 4px;
    }

    .header-tab {
      background: transparent;
      border: 1px solid transparent;
      color: var(--text-dim);
      padding: 8px 16px;
      border-radius: 6px;
      font-family: inherit;
      font-size: 0.8rem;
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.2s;
    }

    .header-tab:hover {
      color: var(--text);
      background: rgba(0, 255, 136, 0.05);
    }

    .header-tab.active {
      background: var(--green);
      color: var(--bg);
      font-weight: 600;
    }

    main {
      position: relative;
      z-index: 10;
      max-width: 1200px;
      margin: 0 auto;
      padding: 20px;
    }

    /* Welcome Section */
    .welcome-section {
      text-align: center;
      padding: 40px 0 20px;
    }

    .welcome-title {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 1.8rem;
      margin-bottom: 8px;
    }

    .welcome-subtitle {
      color: var(--text-dim);
      font-size: 0.9rem;
    }

    /* Progress Bar */
    .progress-section {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 24px;
      margin-bottom: 24px;
    }

    .progress-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }

    .progress-title {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 1.1rem;
    }

    .progress-percent {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--green);
    }

    .progress-bar {
      height: 12px;
      background: rgba(0, 255, 136, 0.1);
      border-radius: 6px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--green-dim), var(--green));
      border-radius: 6px;
      width: 0%;
      transition: width 0.5s ease;
    }

    .progress-stats {
      display: flex;
      justify-content: space-between;
      margin-top: 12px;
      font-size: 0.85rem;
      color: var(--text-dim);
    }

    /* Content sections */
    .content-section {
      display: none;
      animation: fadeIn 0.3s ease;
    }

    .content-section.active {
      display: block;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Cards Grid */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 16px;
    }

    /* Task Card */
    .task-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 20px;
      cursor: pointer;
      transition: all 0.2s;
      position: relative;
      overflow: hidden;
    }

    .task-card:hover {
      border-color: var(--green);
      transform: translateY(-2px);
    }

    .task-card:active {
      transform: translateY(0);
    }

    .task-card.completed {
      border-color: var(--green);
      background: rgba(0, 255, 136, 0.05);
    }

    .task-card.completed::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: var(--green);
    }

    .task-header {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      margin-bottom: 12px;
    }

    .task-check {
      width: 24px;
      height: 24px;
      border: 2px solid var(--border);
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: all 0.2s;
    }

    .task-card.completed .task-check {
      background: var(--green);
      border-color: var(--green);
    }

    .task-check svg {
      opacity: 0;
      transform: scale(0);
      transition: all 0.2s;
    }

    .task-card.completed .task-check svg {
      opacity: 1;
      transform: scale(1);
    }

    .task-title {
      font-weight: 500;
      flex: 1;
      font-size: 0.95rem;
    }

    .task-badge {
      font-size: 0.65rem;
      padding: 4px 10px;
      border-radius: 20px;
      font-weight: 600;
      text-transform: uppercase;
      white-space: nowrap;
    }

    .badge-principiante {
      background: rgba(0, 255, 136, 0.15);
      color: var(--green);
    }

    .badge-intermedio {
      background: rgba(255, 149, 0, 0.15);
      color: var(--orange);
    }

    .badge-avanzado {
      background: rgba(255, 85, 85, 0.15);
      color: var(--red);
    }

    .task-desc {
      font-size: 0.85rem;
      color: var(--text-dim);
      margin-bottom: 12px;
    }

    .task-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: var(--green);
      font-size: 0.85rem;
      text-decoration: none;
    }

    .task-link:hover {
      text-decoration: underline;
    }

    /* Category Header */
    .category-header {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 1.2rem;
      margin: 32px 0 16px;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .category-header::before {
      content: '>';
      color: var(--green);
    }

    /* Filter */
    .filter-row {
      display: flex;
      gap: 12px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    select {
      background: var(--card);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 10px 16px;
      border-radius: 8px;
      font-family: inherit;
      font-size: 0.9rem;
      cursor: pointer;
      min-width: 160px;
    }

    select:focus {
      outline: none;
      border-color: var(--green);
    }

    /* Resources Cards */
    .resource-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 20px;
      transition: all 0.2s;
    }

    .resource-card:hover {
      border-color: var(--green);
    }

    .resource-title {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 1.1rem;
      margin-bottom: 8px;
    }

    .resource-desc {
      font-size: 0.85rem;
      color: var(--text-dim);
      margin-bottom: 16px;
    }

    .resource-links {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .resource-link {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      background: rgba(0, 0, 0, 0.3);
      border-radius: 8px;
      color: var(--text);
      text-decoration: none;
      font-size: 0.85rem;
      transition: background 0.2s;
    }

    .resource-link:hover {
      background: rgba(0, 255, 136, 0.1);
    }

    .link-tag {
      font-size: 0.65rem;
      padding: 3px 8px;
      border-radius: 4px;
      background: rgba(0, 255, 136, 0.15);
      color: var(--green);
      white-space: nowrap;
    }

    /* Scroll fade indicator */
    .scroll-indicator {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      color: var(--text-dim);
      font-size: 0.75rem;
      opacity: 1;
      transition: opacity 0.3s;
      z-index: 50;
      pointer-events: none;
    }

    .scroll-indicator.hidden {
      opacity: 0;
    }

    .scroll-arrow {
      animation: bounce 1.5s infinite;
    }

    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(5px); }
    }

    /* Mobile Styles */
    @media (max-width: 768px) {
      .header-inner {
        padding: 10px 16px;
        flex-wrap: wrap;
      }

      .logo {
        font-size: 1.2rem;
      }

      .header-tabs {
        display: none;
        position: absolute;
        top: 100%;
        left: 0;
        right: 0;
        background: rgba(5, 5, 16, 0.98);
        border-bottom: 1px solid var(--border);
        padding: 12px 16px;
        flex-direction: column;
        gap: 8px;
      }

      .header-tabs.open {
        display: flex;
      }

      .header-tab {
        width: 100%;
        text-align: left;
        padding: 12px 16px;
        font-size: 0.9rem;
      }

      .menu-btn {
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .header-progress {
        flex: 1;
        max-width: none;
      }

      .welcome-section {
        padding: 24px 0 16px;
      }

      .welcome-title {
        font-size: 1.4rem;
      }

      .grid {
        grid-template-columns: 1fr;
      }

      .progress-section {
        padding: 16px;
      }

      .task-card {
        padding: 16px;
      }

      .task-title {
        font-size: 0.9rem;
      }

      .task-desc {
        font-size: 0.8rem;
      }

      .category-header {
        font-size: 1rem;
        margin: 24px 0 12px;
      }

      select {
        width: 100%;
      }
    }

    @media (max-width: 400px) {
      .header-progress {
        display: none;
      }

      .mini-progress-mobile {
        display: block !important;
        margin-top: 10px;
      }

      .header-tabs {
        padding-bottom: 16px;
      }

      .header-tabs.open {
        padding-bottom: 60px;
      }
    }

    .mini-progress-mobile {
      display: none;
    }

    /* Reduced motion */
    @media (prefers-reduced-motion: reduce) {
      * {
        animation: none !important;
        transition: none !important;
      }
    }
  </style>
</head>
<body>
  <canvas id="stars"></canvas>
  <div class="nebula" id="nebula"></div>

  <!-- Sticky Header -->
  <header class="sticky-header" id="stickyHeader">
    <div class="header-inner">
      <div class="logo-section">
        <h1 class="logo"><span>&gt;_</span> cyberpath</h1>
      </div>

      <div class="header-progress" id="headerProgress">
        <div class="mini-progress">
          <div class="mini-progress-fill" id="miniProgressFill"></div>
        </div>
        <span class="mini-percent" id="miniPercent">0%</span>
      </div>

      <nav class="header-tabs" id="headerTabs">
        <button class="header-tab active" data-tab="progreso">Mi Progreso</button>
        <button class="header-tab" data-tab="formacion">Formacion</button>
        <button class="header-tab" data-tab="labs">Laboratorios</button>
        <button class="header-tab" data-tab="comunidades">Comunidades</button>
      </nav>

      <button class="menu-btn" id="menuBtn" aria-label="Menu">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="3" y1="6" x2="21" y2="6"></line>
          <line x1="3" y1="12" x2="21" y2="12"></line>
          <line x1="3" y1="18" x2="21" y2="18"></line>
        </svg>
      </button>
    </div>
    <!-- Mobile progress bar for very small screens -->
    <div class="mini-progress-mobile" style="padding: 0 16px 10px;">
      <div class="mini-progress">
        <div class="mini-progress-fill" id="miniProgressFillMobile"></div>
      </div>
      <div style="display: flex; justify-content: space-between; margin-top: 6px; font-size: 0.75rem; color: var(--text-dim);">
        <span id="completedCountMobile">0 completados</span>
        <span id="miniPercentMobile" style="color: var(--green); font-weight: 700;">0%</span>
      </div>
    </div>
  </header>

  <main>
    <!-- Welcome Section -->
    <section class="welcome-section">
      <h2 class="welcome-title">Tu ruta de aprendizaje en ciberseguridad</h2>
      <p class="welcome-subtitle">Marca los objetivos completados y sigue tu progreso</p>
    </section>

    <!-- Progress Section -->
    <div class="progress-section">
      <div class="progress-header">
        <span class="progress-title">Progreso Total</span>
        <span class="progress-percent" id="percentDisplay">0%</span>
      </div>
      <div class="progress-bar">
        <div class="progress-fill" id="progressFill"></div>
      </div>
      <div class="progress-stats">
        <span id="completedCount">0 completados</span>
        <span id="totalCount">de 15 objetivos</span>
      </div>
    </div>

    <!-- PROGRESO TAB -->
    <div class="content-section active" id="tab-progreso">
      <div class="filter-row">
        <select id="filterLevel">
          <option value="all">Todos los niveles</option>
          <option value="principiante">Principiante</option>
          <option value="intermedio">Intermedio</option>
          <option value="avanzado">Avanzado</option>
        </select>
      </div>

      <div id="tasksContainer"></div>
    </div>

    <!-- FORMACION TAB -->
    <div class="content-section" id="tab-formacion">
      <div class="filter-row">
        <select id="formacionLevel">
          <option value="all">Todos los niveles</option>
          <option value="principiante">Principiante</option>
          <option value="intermedio">Intermedio</option>
          <option value="avanzado">Avanzado</option>
        </select>
      </div>
      <div class="grid" id="formacionGrid"></div>
    </div>

    <!-- LABS TAB -->
    <div class="content-section" id="tab-labs">
      <div class="filter-row">
        <select id="labsLevel">
          <option value="all">Todos los niveles</option>
          <option value="principiante">Principiante</option>
          <option value="intermedio">Intermedio</option>
          <option value="avanzado">Avanzado</option>
        </select>
      </div>
      <div class="grid" id="labsGrid"></div>
    </div>

    <!-- COMUNIDADES TAB -->
    <div class="content-section" id="tab-comunidades">
      <div class="grid" id="comunidadesGrid"></div>
    </div>
  </main>

  <!-- Scroll Indicator -->
  <div class="scroll-indicator" id="scrollIndicator">
    <span>Desliza para explorar</span>
    <svg class="scroll-arrow" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <polyline points="6 9 12 15 18 9"></polyline>
    </svg>
  </div>

  <script>
    // ========== DATA ==========
    const tasks = [

    const formacion = [

      { title: 'Cybrary', level: 'principiante', desc: 'Cursos gratuitos y de pago para todos los niveles', links: [

      { title: 'INE Security', level: 'intermedio', desc: 'Formacion avanzada en red team y blue team', links: [

      { title: 'SANS Institute', level: 'avanzado', desc: 'Formacion elite con 85+ cursos especializados', links: [

        { url: 'https://www.udemy.com/course/python-for-cybersecurity', label: 'Python for Cybersecurity' }
      ]}

    const labs = [
      { title: 'TryHackMe', level: 'principiante', desc: 'Muy amigable para principiantes con rooms guiados', links: [
        { url: 'https://tryhackme.com', label: 'Plataforma' },
        { url: 'https://tryhackme.com/path/outline/cybersecurity101', label: 'Cyber Security 101' }
      ]},
      { title: 'Hack The Box', level: 'intermedio', desc: 'Maquinas reales vulnerables para pentesting', links: [
        { url: 'https://www.hackthebox.com', label: 'Plataforma' },
        { url: 'https://www.hackthebox.com/machines', label: 'Maquinas' }
      ]},
      { title: 'PortSwigger Academy', level: 'intermedio', desc: 'Labs gratuitos de vulnerabilidades web', links: [
        { url: 'https://portswigger.net/web-security', label: 'Web Security Academy' },
        { url: 'https://portswigger.net/web-security/all-labs', label: 'Todos los labs' }
      ]},
      { title: 'Root-Me', level: 'intermedio', desc: '600+ retos de cracking, forense y redes', links: [
        { url: 'https://www.root-me.org', label: 'Plataforma' },
        { url: 'https://www.root-me.org/en/Challenges', label: 'Retos' }
      ]}
    ];

    const comunidades = [
      { title: 'Reddit', level: 'principiante', desc: 'Foros globales de discusion sobre ciberseguridad', links: [
        { url: 'https://www.reddit.com/r/cybersecurity', label: 'r/cybersecurity' },
        { url: 'https://www.reddit.com/r/netsec', label: 'r/netsec' },
        { url: 'https://www.reddit.com/r/hacking', label: 'r/hacking' }
      ]},
      { title: 'Discord', level: 'principiante', desc: 'Servidores de hacking etico y bug bounty', links: [
        { url: 'https://discord.com/invite/cyberverse', label: 'CyberVerse' },
        { url: 'https://disboard.org/es/search?keyword=ciberseguridad', label: 'Buscar servidores' }
      ]},
      { title: 'Stack Overflow', level: 'intermedio', desc: 'Dudas tecnicas de programacion y seguridad', links: [
        { url: 'https://stackoverflow.com/questions/tagged/security', label: 'Tag Security' },
        { url: 'https://security.stackexchange.com', label: 'Security StackExchange' }
      ]}
    ];

    // ========== STATE ==========
    let completed = {};
    try {
      completed = JSON.parse(localStorage.getItem('cyberpath_tasks') || '{}');
    } catch(e) {
      completed = {};
    }

    // ========== DOM ELEMENTS ==========
    const canvas = document.getElementById('stars');
    const ctx = canvas.getContext('2d');
    const nebula = document.getElementById('nebula');
    const stickyHeader = document.getElementById('stickyHeader');
    const scrollIndicator = document.getElementById('scrollIndicator');
    const menuBtn = document.getElementById('menuBtn');
    const headerTabs = document.getElementById('headerTabs');
    
    let stars = [];

    // ========== STARS BACKGROUND ==========
    function initStars() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
      const count = Math.floor((canvas.width * canvas.height) / 6000);
      stars = [];
      for (let i = 0; i < count; i++) {
        stars.push({
          x: Math.random() * canvas.width,
          y: Math.random() * canvas.height,
          r: Math.random() * 1.5 + 0.5,
          a: Math.random()
        });
      }
    }

    function drawStars() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      stars.forEach(s => {
        s.a += 0.005 * (Math.random() > 0.5 ? 1 : -1);
        s.a = Math.max(0.2, Math.min(1, s.a));
        ctx.beginPath();
        ctx.arc(s.x, s.y, Math.max(0.1, s.r), 0, Math.PI * 2);
        ctx.fillStyle = `rgba(255,255,255,${s.a})`;
        ctx.fill();
      });
      requestAnimationFrame(drawStars);
    }

    if (!window.matchMedia('(prefers-reduced-motion: reduce)').matches) {
      initStars();
      drawStars();
      window.addEventListener('resize', initStars);
    }

    // ========== SCROLL EFFECTS ==========
    let lastScrollY = 0;
    const maxScrollFade = 500;

    function handleScroll() {
      const scrollY = window.scrollY;
      
      // Header scrolled state
      if (scrollY > 20) {
        stickyHeader.classList.add('scrolled');
      } else {
        stickyHeader.classList.remove('scrolled');
      }

      // Hide scroll indicator
      if (scrollY > 100) {
        scrollIndicator.classList.add('hidden');
      } else {
        scrollIndicator.classList.remove('hidden');
      }

      // Fade out space background
      const fadeProgress = Math.min(scrollY / maxScrollFade, 1);
      const opacity = 1 - (fadeProgress * 0.85);
      
      canvas.style.opacity = opacity;
      nebula.style.opacity = opacity;

      lastScrollY = scrollY;
    }

    window.addEventListener('scroll', handleScroll, { passive: true });

    // ========== MOBILE MENU ==========
    menuBtn.addEventListener('click', () => {
      headerTabs.classList.toggle('open');
    });

    // Close menu when clicking outside
    document.addEventListener('click', (e) => {
      if (!headerTabs.contains(e.target) && !menuBtn.contains(e.target)) {
        headerTabs.classList.remove('open');
      }
    });

    // ========== RENDER FUNCTIONS ==========
    function renderTasks(filter = 'all') {
      const container = document.getElementById('tasksContainer');
      const categories = [...new Set(tasks.map(t => t.category))];
      
      container.innerHTML = categories.map(cat => {
        const catTasks = tasks.filter(t => t.category === cat && (filter === 'all' || t.level === filter));
        if (catTasks.length === 0) return '';
        
        return `
          <h3 class="category-header">${cat}</h3>
          <div class="grid">
            ${catTasks.map(t => `
              <div class="task-card ${completed[t.id] ? 'completed' : ''}" data-id="${t.id}">
                <div class="task-header">
                  <div class="task-check">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#050510" stroke-width="3">
                      <polyline points="20 6 9 17 4 12"></polyline>
                    </svg>
                  </div>
                  <div class="task-title">${t.title}</div>
                  <span class="task-badge badge-${t.level}">${t.level}</span>
                </div>
                <p class="task-desc">${t.desc}</p>
                <a href="${t.link}" target="_blank" class="task-link" onclick="event.stopPropagation()">
                  Ir al recurso
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M7 17L17 7M17 7H7M17 7V17"/>
                  </svg>
                </a>
              </div>
            `).join('')}
          </div>
        `;
      }).join('');

      // Add click handlers
      container.querySelectorAll('.task-card').forEach(card => {
        card.addEventListener('click', () => {
          const id = parseInt(card.dataset.id);
          completed[id] = !completed[id];
          card.classList.toggle('completed');
          localStorage.setItem('cyberpath_tasks', JSON.stringify(completed));
          updateProgress();
        });
      });
    }

    function renderResources(data, containerId, filter = 'all', tag = '') {
      const container = document.getElementById(containerId);
      const filtered = filter === 'all' ? data : data.filter(r => r.level === filter);
      
      container.innerHTML = filtered.map(r => `
        <div class="resource-card">
          <div class="resource-title">${r.title}</div>
          <span class="task-badge badge-${r.level}" style="margin-bottom: 8px; display: inline-block;">${r.level}</span>
          <p class="resource-desc">${r.desc}</p>
          <div class="resource-links">
            ${r.links.map(l => `
              <a href="${l.url}" target="_blank" class="resource-link">
                <span class="link-tag">${tag || r.title}</span>
                ${l.label}
              </a>
            `).join('')}
          </div>
        </div>
      `).join('');
    }

    function updateProgress() {
      const total = tasks.length;
      const done = Object.values(completed).filter(v => v).length;
      const percent = Math.round((done / total) * 100);

      // Main progress
      document.getElementById('progressFill').style.width = percent + '%';
      document.getElementById('percentDisplay').textContent = percent + '%';
      document.getElementById('completedCount').textContent = done + ' completados';
      document.getElementById('totalCount').textContent = 'de ' + total + ' objetivos';

      // Header mini progress
      document.getElementById('miniProgressFill').style.width = percent + '%';
      document.getElementById('miniPercent').textContent = percent + '%';

      // Mobile mini progress
      const miniMobile = document.getElementById('miniProgressFillMobile');
      if (miniMobile) {
        miniMobile.style.width = percent + '%';
      }
      const miniPercentMobile = document.getElementById('miniPercentMobile');
      if (miniPercentMobile) {
        miniPercentMobile.textContent = percent + '%';
      }
      const completedMobile = document.getElementById('completedCountMobile');
      if (completedMobile) {
        completedMobile.textContent = done + ' completados';
      }
    }

    // ========== TAB SWITCHING ==========
    function switchTab(tabName) {
      // Update header tabs
      document.querySelectorAll('.header-tab').forEach(t => {
        t.classList.toggle('active', t.dataset.tab === tabName);
      });

      // Update content sections
      document.querySelectorAll('.content-section').forEach(s => {
        s.classList.remove('active');
      });
      document.getElementById('tab-' + tabName).classList.add('active');

      // Close mobile menu
      headerTabs.classList.remove('open');
    }

    document.querySelectorAll('.header-tab').forEach(btn => {
      btn.addEventListener('click', () => {
        switchTab(btn.dataset.tab);
      });
    });

    // ========== FILTERS ==========
    document.getElementById('filterLevel').addEventListener('change', e => {
      renderTasks(e.target.value);
    });

    document.getElementById('formacionLevel').addEventListener('change', e => {
      renderResources(formacion, 'formacionGrid', e.target.value, 'FORMACION');
    });

    document.getElementById('labsLevel').addEventListener('change', e => {
      renderResources(labs, 'labsGrid', e.target.value, 'LAB');
    });

    // ========== INIT ==========
    renderTasks();
    renderResources(formacion, 'formacionGrid', 'all', 'FORMACION');
    renderResources(labs, 'labsGrid', 'all', 'LAB');
    renderResources(comunidades, 'comunidadesGrid', 'all', 'COMUNIDAD');
    updateProgress();
    handleScroll();
  </script>
</body>
</html>
